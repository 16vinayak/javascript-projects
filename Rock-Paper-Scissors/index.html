<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="name">
            Rock Paper Scissors with Computer
        </div>
        <img src="assets/icons/dark_mode1.svg" alt="Mode" class="Mode">
    </header>
    <main>
        

        <div class="choice">
            <div class="player">
                <div class="player_choice">
                    Player Choice:
                    <img src="" alt="Player Choice Icon"  class="buttons_icon player_choice_icon">
                    <div class="player_choice_name">
                        Waiting...
                    </div>
                </div>
                <div class="player_choice_value">
                   
                </div>
            </div>
            <div class="computer">
                <div class="computer_choice">
                    Computer Choice:
                    <img src="" alt="Computer Choice Icon" class="buttons_icon computer_choice_icon">
                    <div class="computer_choice_name">
                        Waiting...
                    </div>
                </div>
                <div class="computer_choice_value">

                </div>
            </div>
        </div>

        <div class="hero">
            <div class="count">
                <div class="win">
                    <div class="win_name">
                        WINS
                    </div>
                    <div class="win_count">
                        0
                    </div>
                </div>
                <div class="tie">
                    <div class="tie_name">
                        TIES
                    </div>
                    <div class="tie_count">
                        0
                    </div>
                </div>
                <div class="lose">
                    <div class="lose_name">
                        LOSES
                    </div>
                    <div class="lose_count">
                        0
                    </div>
                </div>
            </div>

            <div class="round_count">
                Round 
                <div class="roundNo">
                    1
                </div>
            </div>
        </div>

        <div class="reaction">

        </div>

        <div class="message">
            Choose your move, rock paper or scissors?
        </div>

        <div class="buttons">
            <button class="rock">
                <img src="assets/icons/rock.svg" alt="" class="buttons_icon">
                Rock</button>
            <button class="paper">
                <img src="assets/icons/hand.svg" alt="" class="buttons_icon">
                PAPER</button>
            <button class="scissors">
                <img src="assets/icons/scissors.svg" alt="" class="buttons_icon">
                SCISSORS</button>
        </div>
        <div class="restart_button">
            <button class="restart">
                Restart Game
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
