<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="assets/icons/counter.svg" alt="Counter Logo" class="counter_logo">
        <div class="counter">
            Counter App
        </div>
    </header>

    <main>
        <div class="count_container">
            <div class="count">
                0
            </div>
        </div>
        <div class="feature">
            <div class="decrement">
                -
            </div>
            <div class="reset">
                Reset
            </div>
            <div class="increment">
                +
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
